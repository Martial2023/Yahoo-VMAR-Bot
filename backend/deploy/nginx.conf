# BotVMAR — reverse proxy nginx pour vmar.qy2ab.keepsec.cloud
#
# Installation sur le VPS :
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/botvmar
#   sudo ln -s /etc/nginx/sites-available/botvmar /etc/nginx/sites-enabled/botvmar
#   sudo nginx -t
#   sudo systemctl reload nginx
#   sudo certbot --nginx -d vmar.qy2ab.keepsec.cloud --redirect
#
# Le bloc HTTP -> HTTPS sera ajouté automatiquement par certbot.

upstream botvmar_backend {
    server 127.0.0.1:8001;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name vmar.qy2ab.keepsec.cloud;

    # Augmenter les timeouts car certains endpoints lancent un cycle qui peut
    # prendre quelques secondes (POST /trigger-cycle réveille juste le worker
    # mais GET /status fait un read DB rapide).
    proxy_connect_timeout 30s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # Hide upstream signature
    server_tokens off;

    # Body size : on poste juste du JSON, 1MB largement suffisant
    client_max_body_size 1m;

    # Headers de sécurité de base
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "DENY"    always;
    add_header Referrer-Policy        "no-referrer" always;

    location / {
        proxy_pass http://botvmar_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # Pas de cache : les endpoints sont tous dynamiques
        proxy_buffering off;
    }

    # Healthcheck public (sans auth) — utile pour monitoring externe
    location = /health {
        proxy_pass http://botvmar_backend/health;
        access_log off;
    }
}
